# Minimal ESPHome example for the M32JM external component.
#
# Wiring (M32JM cable → ESP32-DevKitC):
#   Red    → 3V3
#   Black  → GND
#   Green  → SDA (GPIO21)
#   White  → SCL (GPIO22)
#   Plus 4.7 kΩ pull-ups on SDA and SCL to 3V3.

esphome:
  name: m32jm-test

esp32:
  board: esp32dev
  framework:
    type: esp-idf  # ESP-IDF backend is required: the MR (measurement-request)
                   # I²C transaction relies on the IDF bus emitting a 0-byte
                   # read header. The Arduino TwoWire backend handles len=0
                   # inconsistently across platform versions.

logger:
  level: DEBUG

# Pull the component from this checkout. To use from GitHub instead, replace
# with:
#   external_components:
#     - source: github://kenavn/esphome-m32jm@main
external_components:
  - source:
      type: local
      path: components

i2c:
  sda: GPIO21
  scl: GPIO22
  frequency: 100kHz
  scan: true  # logs detected devices on boot — useful for first-bring-up

sensor:
  - platform: m32jm
    address: 0x28          # M3200 factory default (alternates: 0x36/0x46/0x48/0x51)
    full_scale_psi: 100.0  # match the "-100PG" suffix on your part number
    update_interval: 1s
    pressure:
      name: "M32JM Pressure"
    temperature:
      name: "M32JM Temperature"

# Uncomment to expose the sensors to Home Assistant via the native API:
#
# wifi:
#   ssid: !secret wifi_ssid
#   password: !secret wifi_password
#
# api:
#   encryption:
#     key: !secret api_key
#
# ota:
#   - platform: esphome
#     password: !secret ota_password
