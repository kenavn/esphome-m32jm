name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run so upstream ESPHome / IDF changes don't go undetected.
    # Offset minute to dodge GitHub's :00 cron rate-limit.
    - cron: "23 6 * * 1"
  workflow_dispatch:

jobs:
  esphome-compile:
    name: Compile (esphome ${{ matrix.esphome }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - esphome: stable
            install: pip install -r requirements.txt
          - esphome: dev
            install: pip install -U git+https://github.com/esphome/esphome.git@dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ESPHome (${{ matrix.esphome }})
        run: ${{ matrix.install }}

      - name: Compile example.yaml
        run: esphome compile example.yaml
